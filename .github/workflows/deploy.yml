name: Deploy Kerala Shop POS to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pos-app/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: pos-app

      - name: Build
        run: npm run build
        working-directory: pos-app
        env:
          VITE_BASE_URL: /my-apps/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pos-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
