name: Deploy POS App to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - pos-app/**
      - .github/workflows/deploy.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: pos-app

      - name: Build
        run: npm run build
        working-directory: pos-app
        env:
          VITE_BASE_URL: /my-apps/pos/

      # Deploys ONLY into the /pos subfolder of gh-pages.
      # keep_files: true ensures existing files (Kuri app at root) are untouched.
      - name: Deploy to /pos subfolder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pos-app/dist
          destination_dir: pos
          keep_files: true
