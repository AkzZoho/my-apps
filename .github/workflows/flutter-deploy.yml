name: Deploy Flutter Apps to GitHub Pages

on:
  push:
    branches: [claude/committee-app-ui-testing-YTw60, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-committee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
      - run: flutter pub get
        working-directory: apps/committee
      - run: flutter build web --release --base-href /my-apps/committee/
        working-directory: apps/committee
      - uses: actions/upload-artifact@v4
        with:
          name: committee-web
          path: apps/committee/build/web

  build-kuri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
      - run: flutter pub get
        working-directory: apps/kuri
      - run: flutter build web --release --base-href /my-apps/kuri/
        working-directory: apps/kuri
      - uses: actions/upload-artifact@v4
        with:
          name: kuri-web
          path: apps/kuri/build/web

  deploy:
    needs: [build-committee, build-kuri]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: committee-web
          path: dist/committee
      - uses: actions/download-artifact@v4
        with:
          name: kuri-web
          path: dist/kuri
      - name: Create root index
        run: |
          mkdir -p dist
          cat > dist/index.html <<'HTMLEOF'
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>My Apps</title>
<style>body{font-family:sans-serif;background:#020817;color:#e2e8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;margin:0}</style>
</head>
<body>
<h1>My Apps</h1>
<a href="committee/" style="color:#22d3ee;font-size:20px">Committee →</a>
<a href="kuri/" style="color:#22d3ee;font-size:20px">Kuri →</a>
</body>
</html>
HTMLEOF
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
