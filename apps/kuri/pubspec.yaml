name: kuri_app
description: Track your Kuri savings plans
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_database: ^11.1.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  file_picker: ^8.1.2
  google_sign_in: ^6.2.2
  crypto: ^3.0.3
  http: ^1.2.2
  go_router: ^14.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/kuri_icon.png"
  adaptive_icon_background: "#0E6E6E"
  adaptive_icon_foreground: "assets/kuri_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/kuri_icon.png
